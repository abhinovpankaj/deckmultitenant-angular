<h1 mat-dialog-title class="mat-dialog-title">{{isForEdit ? 'Edit' : 'Add New'}} Form</h1>
<div mat-dialog-content class="mat-dialog-content" id="dialog-add-form">
  <div>
    <form class="input-row font-size-14">
      <div class="input-row bottom-border">
        <label>Form Name</label>
        <div class="question-row">
          <mat-form-field appearance="outline" class="hide-hint full-width">
            <input matInput name="formName" [(ngModel)]="form.name" type="Text" placeholder="Form Name">
          </mat-form-field>
        </div>
        <div *ngIf="isShowError && (!form.name || form.name == '')" class="form-errors">Form Name is required.</div>
      </div>
      <hr/>
          <div cdkDropList (cdkDropListDropped)="drop($event)" class="questions-list-container">
            <div class="draggable-question-card" *ngFor="let question of questions; let i=index; trackBy: trackByQuestion" cdkDrag>
              <div class="question-card-content">
                <span class="drag-handle-absolute" cdkDragHandle>
                  <span class="question-seq-number">{{i + 1}}</span>
                  <mat-icon class="drag-grip-icon">drag_indicator</mat-icon>
                </span>
                <div class="question-main-fields">
                  <mat-form-field appearance="outline" class="question-name-field">
                    <input matInput name="question_{{i}}" [(ngModel)]="question.name" type="Text" placeholder="Question {{i + 1}}">
                  </mat-form-field>
                    <div class="type-mandatory-actions-row">
                      <mat-form-field appearance="outline" class="question-type-field">
                        <mat-label>Type</mat-label>
                        <mat-select id="type_{{i}}" name="type_{{i}}" [(ngModel)]="question.type" (selectionChange)="onChange($event, question, i)" title="Question Type">
                          <mat-option value="Text">Single Line Text</mat-option>
                          <mat-option value="Textarea">Multi Line Text</mat-option>
                          <mat-option value="Checkbox">Multiple Choice</mat-option>
                          <mat-option value="Dropdown">Dropdown</mat-option>
                          <mat-option value="Radiobutton">Radio Button</mat-option>
                        </mat-select>
                      </mat-form-field>
                      <div class="mandatory-checkbox">
                        <label for="mandatory_{{i}}">Mandatory</label>
                        <input id="mandatory_{{i}}" type="checkbox" [checked]="question.isMandatory" (change)="question.isMandatory = !question.isMandatory">
                      </div>
                      <div class="card-actions" *ngIf="questions.length !== 1 || isForEdit">
                        <button *ngIf="questions.length !== 1" mat-mini-fab class="add-remove-btn" type="button" (click)="removequestion(i)">
                          <mat-spinner *ngIf="loadingObj[i]" diameter="20"></mat-spinner>
                          <mat-icon *ngIf="!loadingObj[i]" class="remove-icon flex-center">delete_outline</mat-icon>
                        </button>
                        <button *ngIf="isForEdit" mat-mini-fab class="add-remove-btn ml-10" type="button" (click)="saveQuestion(i)">
                          <mat-spinner *ngIf="loadingObj[i]" diameter="20"></mat-spinner>
                          <mat-icon *ngIf="!loadingObj[i]" class="remove-icon flex-center">save</mat-icon>
                        </button>
                      </div>
                    </div>
                </div>
              </div>
            <div *ngIf="isShowError && question.error" class="form-errors">Question {{i + 1}} is required.</div>

              <div class="option-container" *ngIf="question.type !== 'Text' && question.type !== 'Textarea'">
                <div class="option-list">
                  <div class="option-row" *ngFor="let option of question.allowedValues; let j=index; trackBy: trackByFn">
                    <mat-form-field appearance="outline" class="option-field">
                      <input matInput name="option_{{i}}_{{j}}" [(ngModel)]="question.allowedValues[j]" type="text" placeholder="Option {{j + 1}}">
                    </mat-form-field>
                    <button type="button" (click)="addOption(i,j)" mat-mini-fab class="add-remove-btn" id="add-option-btn">
                      <mat-icon class="add-icon flex-center">add</mat-icon>
                    </button>
                    <button type="button" (click)="removeOption(i,j)" mat-mini-fab class="add-remove-btn" id="remove-option-btn">
                      <mat-icon class="remove-icon flex-center">remove</mat-icon>
                    </button>
                  </div>
                </div>
              </div>
            <div *ngIf="isShowError && question.optionError" class="form-errors">All Options is required.</div>
            <hr *ngIf="i !== (questions.length - 1)"/>
            </div>
          </div>
    </form>
  </div>
</div>

<div mat-dialog-actions class="flex-space-between">
  <div>
    <button mat-button (click)="onNoClick()">Close</button>
    <button mat-button [disabled]="isSaving" (click)="submitData()">
      <mat-spinner *ngIf="isSaving" diameter="25"></mat-spinner>
      <span *ngIf="!isSaving">Save</span>
    </button>
  </div>
  <div>
    <button class="form-btn p-10" type="button" (click)="addquestion()">Add Question</button>
  </div>
</div>
